name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Start production server
        run: |
          pnpm exec next start > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid

      - name: Smoke test primary routes
        run: pnpm smoke:routes

      - name: Verify home anchors
        run: pnpm check:anchors

      - name: Verify security headers
        run: pnpm check:security-headers

      - name: Stop production server
        if: always()
        run: |
          if [ -f /tmp/next-start.pid ]; then
            kill "$(cat /tmp/next-start.pid)" || true
          fi
